# floodgate configuration

# Channel policy: "blacklist" (zero-hop only listed channels) or
#                 "whitelist" (zero-hop all except listed channels)
channel_policy: "blacklist"

# Channels to zero-hop (blacklist mode). Standard Meshtastic public presets.
channel_blacklist:
  - "LongTurbo"
  - "LongFast"
  - "LongModerate"
  - "MediumFast"
  - "MediumSlow"
  - "ShortFast"
  - "ShortSlow"
  - "ShortTurbo"

# Channels exempt from zero-hop (whitelist mode only).
channel_whitelist: []

grpc_port: 9000
health_port: 8080
topic_filter: "msh/#"
stats_interval_s: 60

# INFO logs per-message outcomes. DEBUG adds verbose internals.
log_level: "INFO"

# "text" (human-readable) or "json" (structured, for Loki/Grafana).
# Override with FLOODGATE_LOG_FORMAT env var.
log_format: "text"
