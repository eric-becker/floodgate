apiVersion: apps/v1
kind: Deployment
metadata:
  name: floodgate
  labels:
    app: floodgate
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: floodgate
  template:
    metadata:
      labels:
        app: floodgate
    spec:
      containers:
        - name: floodgate
          image: ghcr.io/eric-becker/floodgate:latest
          ports:
            - containerPort: 9000
              protocol: TCP
            - containerPort: 8080
              name: health
          env:
            - name: FLOODGATE_CONFIG
              value: /etc/floodgate/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/floodgate
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: floodgate-config
